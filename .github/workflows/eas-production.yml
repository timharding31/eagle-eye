name: EAS Build — Production

# Durable releases: push a version tag (e.g. v0.2.0) to build a production APK
# in the cloud and attach it to a GitHub Release for sharing/sideloading. Also
# runnable on-demand from the Actions tab (uploads an artifact, no release).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: eas-production-${{ github.ref }}
  cancel-in-progress: false # never kill a release build midway

permissions:
  contents: write # create the GitHub Release + upload the APK asset

jobs:
  build:
    name: Build production APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Generate Drizzle migrations
        # drizzle/ is gitignored but inline-imported at build time
        # (@/drizzle/migrations, *.sql). EAS archives the runner's working tree,
        # so the artifact must exist locally before `eas build` uploads it —
        # otherwise Metro fails with "Unable to resolve @/drizzle/migrations".
        run: npm run db:generate

      - name: Build Android production (APK)
        id: build
        run: |
          eas build --platform android --profile production --non-interactive --wait --json > build.json
          URL="$(jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty' build.json)"
          if [ -z "$URL" ]; then echo "No artifact URL from EAS"; cat build.json; exit 1; fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          NAME="eagle-eye-${GITHUB_REF_NAME//\//-}.apk"
          curl -fL -o "$NAME" "${{ steps.build.outputs.url }}"
          echo "apk=$NAME" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eagle-eye-production-apk
          path: ${{ env.apk }}
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.apk }}
          generate_release_notes: true
